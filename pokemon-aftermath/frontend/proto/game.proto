syntax = "proto3";

package aftermath;

service GameEngine {
  rpc MovePlayer      (MoveRequest)       returns (PlayerState);
  rpc GetWorldState   (WorldStateRequest) returns (WorldState);
  rpc GetSpawns       (SpawnRequest)      returns (SpawnResponse);
}

// ── Movimento ──────────────────────────────
message MoveRequest {
  string player_id  = 1;
  Direction direction = 2;
}

enum Direction {
  NONE  = 0;
  UP    = 1;
  DOWN  = 2;
  LEFT  = 3;
  RIGHT = 4;
}

message PlayerState {
  string player_id = 1;
  int32  x         = 2;
  int32  y         = 3;
  string region    = 4;
  bool   blocked   = 5;
}

// ── Estado do Mundo ────────────────────────
message WorldStateRequest {
  string player_id = 1;
}

message WorldState {
  string weather      = 1;
  string time_of_day  = 2;
  int32  reputation   = 3;
  repeated NPC nearby_npcs = 4;
}

message NPC {
  string npc_id  = 1;
  string name    = 2;
  int32  x       = 3;
  int32  y       = 4;
  string faction = 5;
}

// ── Spawns ─────────────────────────────────
message SpawnRequest {
  string region  = 1;
  string habitat = 2;
  string weather = 3;
}

message SpawnResponse {
  repeated PokemonSpawn spawns = 1;
}

message PokemonSpawn {
  int32  pokedex_number = 1;
  string name           = 2;
  float  encounter_prob = 3;
  string rarity         = 4;
}